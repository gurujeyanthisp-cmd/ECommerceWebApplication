<!DOCTYPE html>
<html>

<head>
    <title>E-Commerce Store</title>
</head>

<body>

    <h1>Simple E-Commerce Store</h1>

    {% for product in products %}

    <div>

        <h2>{{ product.name }}</h2>

        <p>Price: ₹{{ product.price }}</p>

        <button>Add to Cart</button>

    </div>

    <hr>

    {% endfor %}

</body>

</html>
